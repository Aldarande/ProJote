<div class="cmd cmd-widget #history#" data-type="info" data-subtype="string" data-template="note" data-cmd_id="#id#"
    data-cmd_uid="#uid#" data-version="#version#" data-eqLogic_id="">
    <div class="content-xs">
        <div class="cmdName #hide_name#">#name_display#</div>
        <div class="projote-widget-container value" style="max-width: 245px; max-height: 350px;">#value#</div>
    </div>
    
    <script>
        jeedom.cmd.addUpdateFunction('#id#', function (_options) {
            const cmd = document.querySelector('.cmd[data-cmd_uid="#uid#"]');
            if (!is_object(cmd)) {
                return;
            }

            const noteData = _options.value;
            const container = cmd.querySelector('.value');

            if (!noteData || noteData.trim() === '' || noteData === '[]' || noteData === 'Pas de notes retournées' || noteData === 'Pas de dernière note retournée') {
                container.innerHTML = '<div style="color:gray;">Aucune note à afficher.</div>';
                return;
            }

            try {
                const notes = JSON.parse(noteData);
                const noteHTML = Array.isArray(notes) ? notes.map(note => {
                    const noteVal = parseFloat((note.note ?? '').toString().replace(',', '.'));
                    const surVal = parseFloat((note.sur ?? '').toString().replace(',', '.'));
                    const greenHeight = (!isNaN(noteVal) && !isNaN(surVal) && surVal > 0) ? (noteVal / surVal * 100) : 0;
                    
                    let optionalBonus = [note.optionnel ? 'optionnel' : '', note.bonus ? 'bonus' : ''].filter(Boolean).join(' ');

                    return `
                        <div class="projote-item projote-note-item">
                            <div class="projote-grade-bar">
                                <div class="projote-grade-bar-inner" style="height:${greenHeight}%;"></div>
                            </div>
                            <div class="projote-item-header">${note.cours ?? ''}</div>
                            <div class="projote-item-meta">
                                <span>${note.date ?? ''}</span>
                                ${optionalBonus ? `<span> - ${optionalBonus}</span>` : ''}
                            </div>
                            <div class="projote-item-body">
                                <div class="note" style="font-size:1.1em; font-style:italic;">
                                    ${(note.note ?? '')}${note.sur ? ' / ' + note.sur : ''}
                                </div>
                                <div class="commentaire" style="font-size:0.9em;">
                                    ${note.commentaire ?? ''}
                                </div>
                            </div>
                        </div>
                    `;
                }).join('') : '<div style="color:gray;">Aucune note.</div>';
                
                container.innerHTML = noteHTML;

            } catch (e) {
                container.innerHTML = '<div style="color:red;">Erreur de données de note.</div>';
                console.error("Erreur lors du parsing des données JSON :", e);
            }
        });

        jeedom.cmd.refreshValue([{ cmd_id: '#id#', value: '#value#', display_value: '#state#', valueDate: '#valueDate#', collectDate: '#collectDate#', alertLevel: '#alertLevel#' }]);
    </script>
</div>
