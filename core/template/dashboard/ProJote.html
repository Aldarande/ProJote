        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;

                <div class="edt-col-title">Aujourd'hui</div>

</div><!-- .pjw-#id# -->

<script>
    (function () {
        'use strict';
        var ID = '#id#';
        var EID = '#id#';
        var LAST_LOGIN_CMD_ID = #lastLoginCmdId#;

        var D = #initData#;
        var VIS = #visibilityMap#;
        var DEFAULT_TAB = '#default_tab#';
        var EDT_NAV_MODE = '#edt_nav_mode#';
        var edtDayIdx = 0;
        var edtCurrentData = null;

        /* ─── Utilitaires DOM ─────────────────────────────── */
        function el(id) { return document.getElementById(id); }

        function esc(s) {
            return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function escAttr(s) {
            return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        function ratio(v, sur) {
            var a = parseFloat(String(v || '').replace(',', '.'));
            var b = parseFloat(String(sur || '20').replace(',', '.'));
            return (!isNaN(a) && !isNaN(b) && b > 0) ? a / b : null;
        }

        function gradeClass(r) {
            if (r === null) return '';
            return r >= 0.70 ? 'c-ok' : r >= 0.50 ? 'c-warn' : 'c-bad';
        }

        function subjectColor(name) {
            var s = String(name || '');
            var h = 0;
            for (var i = 0; i < s.length; i++) {
                h = (Math.imul(31, h) + s.charCodeAt(i)) | 0;
            }
            return 'hsl(' + (Math.abs(h) % 360) + ',50%,42%)';
        }

        function fmtH(h) {
            var s = String(h || '');
            if (s.length === 4) return s.slice(0, 2) + ':' + s.slice(2);
            return s;
        }

        function fmtTs(dt) {
            try {
                var d = new Date(dt);
                return 'Màj ' + d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
            } catch (e) { return ''; }
        }

        function minToHHMM(min) {
            return String(Math.floor(min / 60)).padStart(2, '0') + String(min % 60).padStart(2, '0');
        }

        function timeRange(courses) {
            if (!courses || !courses.length) return '';
            var starts = [], ends = [];
            courses.forEach(function (c) {
                if (c.annulation) return; // cours annulé n'impacte pas les horaires
                if (c.heure) starts.push(c.heure);
                if (c.heure_fin) ends.push(c.heure_fin);
            });
            if (!starts.length) return '';
            starts.sort(); ends.sort();
            return fmtH(starts[0]) + ' \u2014 ' + fmtH(ends[ends.length - 1]);
        }

        /* ─── EN-TÊTE ─────────────────────────────────────── */
        function renderHeader(d, ts) {
            var ph = document.querySelector('.pjw-' + ID + ' .ph');
            if (ph) ph.style.display = VIS.header ? '' : 'none';
            if (!VIS.header) return;

            var nm = el('pjwnm' + ID); if (nm) nm.textContent = (d.eleve || '–').toUpperCase();
            var cl = el('pjwcl' + ID); if (cl) cl.textContent = d.classe || '';
            var sc = el('pjwsc' + ID); if (sc) sc.textContent = d.etablissement || '';
            var ts_ = el('pjwts' + ID); if (ts_ && ts) ts_.textContent = fmtTs(ts);
            var av = el('pjwav' + ID);
            if (av) {
                if (d.photo && VIS.photo) {
                    av.innerHTML = '<img src="' + esc(d.photo) + '" alt="">';
                } else {
                    av.textContent = (d.eleve || '?').split(' ')
                        .map(function (w) { return w[0]; }).join('').slice(0, 2).toUpperCase();
                }
            }
        }

        /* ─── EDT : pills pleine largeur ─────────────────── */
        function toMin(hhmm) {
            var s = String(hhmm || '').replace(':', '');
            if (s.length >= 3) return parseInt(s.slice(0, s.length - 2), 10) * 60 + parseInt(s.slice(-2), 10);
            return 0;
        }

        function repasPill(startStr, endStr) {
            return '<div class="edt-pill">' +
                '<div class="edt-pill-bar" style="background:#27ae60"></div>' +
                '<div class="edt-pill-text">' +
                '<span class="edt-t-start">' + esc(startStr) + '</span>' +
                '<span class="edt-t-name">🍽 Repas</span>' +
                '<span class="edt-t-end">' + esc(endStr) + '</span>' +
                '</div>' +
                '</div>';
        }

        function gapPill(startStr, endStr) {
            return '<div class="edt-pill edt-pill-gap">' +
                '<div class="edt-pill-bar" style="background:#95a5a6"></div>' +
                '<div class="edt-pill-text">' +
                '<span class="edt-t-start">' + esc(startStr) + '</span>' +
                '<span class="edt-t-name">Pas de cours</span>' +
                '<span class="edt-t-end">' + esc(endStr) + '</span>' +
                '</div>' +
                '</div>';
        }

        function edtCoursesHtml(courses) {
            if (!courses || !courses.length) return '<div class="p-empty">Pas de cours</div>';
            var result = [];
            var lastActiveEndMin = -1; // heure de fin du dernier cours NON annulé

            for (var i = 0; i < courses.length; i++) {
                var c = courses[i];
                var canceled = !!c.annulation;
                var time = fmtH(c.heure);
                var timeEnd = fmtH(c.heure_fin);
                var name = c.cours || '';
                var room = c.salle ? ' · ' + c.salle : '';
                var isRepas = (name === 'Repas' || name === 'REPAS');
                var color = isRepas ? '#27ae60' : (c.background_color || '#7f8c8d');

                // Gap/repas : se détecte avant tout cours, annulé ou non
                var currStartMin = toMin(c.heure);
                if (lastActiveEndMin >= 0) {
                    var gap = currStartMin - lastActiveEndMin;
                    var prevEndStr = fmtH(minToHHMM(lastActiveEndMin));
                    // Pause de midi : gap ≥ 30 min, fin préc ≥ 11h00, début suiv ≤ 14h00
                    if (gap >= 30 && lastActiveEndMin >= 11 * 60 && currStartMin <= 14 * 60) {
                        result.push(repasPill(prevEndStr, time));
                        lastActiveEndMin = currStartMin; // avance le repère pour ne pas redoubler
                        // Trou ≥ 60 min hors midi → "Pas de cours"
                    } else if (gap >= 60) {
                        result.push(gapPill(prevEndStr, time));
                        lastActiveEndMin = currStartMin;
                    }
                }

                if (!canceled) {
                    lastActiveEndMin = toMin(c.heure_fin);
                } else {
                    // Cours annulé : avancer quand même au-delà de son créneau
                    // pour éviter un trou qui chevaucherait son affichage
                    lastActiveEndMin = Math.max(lastActiveEndMin, toMin(c.heure_fin));
                }

                if (canceled) {
                    // v1.0.1 : enrichissement avec prof (matière · prof · salle — Annulé)
                    var prof = c.Professeur ? ' · ' + c.Professeur : '';
                    result.push(
                        '<div class="edt-pill edt-pill-annule" title="' + escAttr(name + prof + room) + ' — Annulé">' +
                        '<div class="edt-pill-bar" style="background:' + esc(color) + '"></div>' +
                        '<div class="edt-pill-text">' +
                        '<span class="edt-t-start">' + esc(time) + '</span>' +
                        '<span class="edt-t-annule">❌ ' + esc(name + prof + room) + ' — Annulé</span>' +
                        '<span class="edt-t-end">' + esc(timeEnd) + '</span>' +
                        '</div>' +
                        '</div>'
                    );
                } else if (c.est_retenue) {
                    result.push(
                        '<div class="edt-pill edt-pill-retenue">' +
                        '<div class="edt-pill-bar" style="background:#c0392b"></div>' +
                        '<div class="edt-pill-text">' +
                        '<span class="edt-t-start">' + esc(time) + '</span>' +
                        '<span class="edt-t-name">⚠ ' + esc(name) + '</span>' +
                        '<span class="edt-t-end">' + esc(timeEnd) + '</span>' +
                        '</div>' +
                        '</div>'
                    );
                } else {
                    var nameHtml = isRepas ? '🍽 Repas' : esc(name + room);
                    result.push(
                        '<div class="edt-pill">' +
                        '<div class="edt-pill-bar" style="background:' + esc(color) + '"></div>' +
                        '<div class="edt-pill-text">' +
                        '<span class="edt-t-start">' + esc(time) + '</span>' +
                        '<span class="edt-t-name">' + nameHtml + '</span>' +
                        '<span class="edt-t-end">' + esc(timeEnd) + '</span>' +
                        '</div>' +
                        '</div>'
                    );
                }
            }
            return result.join('');
        }

        /* Extrait les retenues programmées (schedule) pour un jour donné ("DD/MM") */
        function retenuesCourses(punitions, dateStr) {
            var result = [];
            (punitions || []).forEach(function (p) {
                (p.schedule || []).forEach(function (s) {
                    if (!s.start || s.start.slice(0, 5) !== dateStr) return;
                    var parts = s.start.split(' ');
                    var timeParts = (parts[1] || '00:00').split(':');
                    var hh = timeParts[0] || '00';
                    var mm = timeParts[1] || '00';
                    var startHHMM = hh + mm;
                    var endHHMM = '';
                    if (s.duree) {
                        var startMin = parseInt(hh, 10) * 60 + parseInt(mm, 10);
                        var endMin = startMin + s.duree;
                        endHHMM = String(Math.floor(endMin / 60)).padStart(2, '0') +
                            String(endMin % 60).padStart(2, '0');
                    }
                    result.push({
                        cours: p.type || 'Retenue',
                        heure: startHHMM,
                        heure_fin: endHHMM,
                        salle: '',
                        annulation: false,
                        background_color: '#c0392b',
                        est_retenue: true
                    });
                });
            });
            return result;
        }

        function mergeAndSort(courses, retenues) {
            return courses.concat(retenues).sort(function (a, b) {
                return (a.heure || '').localeCompare(b.heure || '');
            });
        }

        function renderEdtDay(d) {
            var days = (d && d.edt_next_days) || [];
            var day = days[edtDayIdx] || null;

            // Fallback rétro-compat : widget_json sans edt_next_days (avant v0.9b)
            if (!day && edtDayIdx === 0 && d && (d.edt_prochainjour || []).length) {
                day = {
                    cours: d.edt_prochainjour || [],
                    date: d.edt_prochainjour_date || '',
                    debut: d.edt_prochainjour_debut || '',
                    fin: d.edt_prochainjour_fin || '',
                    cancel: d.edt_prochainjour_cancel || 0,
                };
            }

            var lbl = el('pjwlbl-dem' + ID);
            var rng = el('pjwrng-dem' + ID);
            var ec = el('pjwec-dem' + ID);
            var prev = el('pjwnav-prev' + ID);
            var next = el('pjwnav-next' + ID);

            // Afficher/masquer les flèches selon le mode
            var showNav = EDT_NAV_MODE === 'arrows';
            if (prev) prev.style.display = showNav ? '' : 'none';
            if (next) next.style.display = showNav ? '' : 'none';

            if (day) {
                var dp = (day.date || '').split('/');
                var dateStr = dp.length >= 2 ? dp[0] + '/' + dp[1] : '';
                var courses = mergeAndSort(
                    day.cours || [],
                    dateStr ? retenuesCourses(d.punitions, dateStr) : []
                );
                if (lbl) lbl.textContent = day.date || 'Prochain jour';
                if (rng) rng.textContent = timeRange(courses);
                if (ec) ec.innerHTML = edtCoursesHtml(courses);
            } else {
                if (lbl) lbl.textContent = 'Prochain jour';
                if (rng) rng.textContent = '';
                if (ec) ec.innerHTML = '<div class="p-empty">Pas de cours</div>';
            }

            // État des flèches (grisé aux extrémités)
            if (showNav) {
                if (prev) prev.disabled = (edtDayIdx === 0);
                if (next) next.disabled = (edtDayIdx >= days.length - 1);
            }
        }

        function renderEDT(d) {
            edtCurrentData = d;
            var edtEl = el('pjwedt' + ID);
            var now = new Date();
            function ddmm(dt) {
                return String(dt.getDate()).padStart(2, '0') + '/' + String(dt.getMonth() + 1).padStart(2, '0');
            }
            var todayStr = ddmm(now);

            var colAuj = el('pjwcol-auj' + ID);
            if (colAuj) colAuj.style.display = VIS.edt_aujourdhui ? '' : 'none';
            if (VIS.edt_aujourdhui) {
                var rng_auj = el('pjwrng-auj' + ID);
                var ec_auj = el('pjwec-auj' + ID);
                var courses_auj = mergeAndSort(
                    d.edt_aujourdhui || [],
                    retenuesCourses(d.punitions, todayStr)
                );
                if (rng_auj) rng_auj.textContent = timeRange(courses_auj);
                if (ec_auj) ec_auj.innerHTML = edtCoursesHtml(courses_auj);
            }

            var colDem = el('pjwcol-dem' + ID);
            if (colDem) colDem.style.display = VIS.edt_prochainjour ? '' : 'none';
            if (VIS.edt_prochainjour) {
                renderEdtDay(d);
            }

            if (edtEl) edtEl.style.display = (VIS.edt_aujourdhui || VIS.edt_prochainjour) ? '' : 'none';
        }

        /* ─── BARRE DE MOYENNE (fill depuis gauche) ─────── */
        function renderNotesBar(d) {
            var notes = d.notes;
            var nb = document.querySelector('.pjw-' + ID + ' .nb');
            if (nb) nb.style.display = VIS.notes ? '' : 'none';
            if (!VIS.notes) return;

            var moyEl = el('pjwmoy' + ID);
            var fillEl = el('pjwnbf' + ID);
            var trendEl = el('pjwtrend' + ID);

            // Utilisation de la moyenne officielle Pronote si disponible
            // Pronote retourne "-1" comme sentinelle quand la moyenne n'est pas calculée
            var officialAvg = (d.moyennes_periodes && d.moyennes_periodes.length > 0)
                ? d.moyennes_periodes[d.moyennes_periodes.length - 1].moyenne_eleve
                : null;
            if (officialAvg !== null && (parseFloat(String(officialAvg).replace(',', '.')) < 0 || String(officialAvg).trim() === '')) officialAvg = null;

            if (!officialAvg && (!notes || !Array.isArray(notes) || !notes.length)) {
                if (moyEl) moyEl.textContent = '–';
                if (fillEl) fillEl.style.width = '0%';
                return;
            }

            var moy, pct;
            if (officialAvg) {
                moy = String(officialAvg).replace('.', ',');
                pct = Math.min(100, Math.round(parseFloat(String(officialAvg).replace(',', '.')) / 20 * 100));
            } else {
                var tot = 0, coefs = 0;
                notes.forEach(function (n) {
                    var r = ratio(n.note, n.sur);
                    var c = parseFloat(String(n.coeff !== undefined ? n.coeff : '1').replace(',', '.'));
                    if (isNaN(c)) c = 1;
                    if (r !== null) { tot += r * 20 * c; coefs += c; }
                });
                if (coefs > 0) {
                    moy = (tot / coefs).toFixed(1).replace('.', ',');
                    pct = Math.min(100, Math.round(parseFloat(moy.replace(',', '.')) / 20 * 100));
                }
            }

            if (moy !== undefined) {
                if (moyEl) moyEl.textContent = moy + '/20';
                if (fillEl) fillEl.style.width = pct + '%';
                if (trendEl && notes.length >= 4) {
                    var sorted = notes.slice().sort(function (a, b) { return (a.date || '').localeCompare(b.date || ''); });
                    var first3 = sorted.slice(0, 3), last3 = sorted.slice(-3);
                    var avg = function (arr) {
                        var s = 0, n = 0;
                        arr.forEach(function (x) { var r = ratio(x.note, x.sur); if (r !== null) { s += r; n++; } });
                        return n ? s / n : 0;
                    };
                    var up = avg(last3) >= avg(first3);
                    trendEl.textContent = up ? '↗' : '↘';
                    trendEl.className = 'nb-trend ' + (up ? 'c-ok' : 'c-bad');
                }
            }
        }

        /* ─── DERNIÈRES NOTES (onglet) ────────────────────── */
        function renderDernieresNotes(notes, data) {
            var dnEl = el('pjwdn' + ID);
            if (!dnEl) return;
            if (!VIS.notes) { var pane = el('notes' + ID); if (pane) pane.style.display = 'none'; return; }
            if (!notes || !Array.isArray(notes) || !notes.length) {
                dnEl.innerHTML = '<div class="p-empty">Aucune note</div>';
                return;
            }
            function dateKey(d) {
                var p = (d || '').split('/');
                return p.length === 3 ? p[2] + p[1] + p[0] : (d || '');
            }
            var sorted = notes.slice()
                .sort(function (a, b) { return dateKey(b.date).localeCompare(dateKey(a.date)); })
                .slice(0, 10);
            dnEl.innerHTML = sorted.map(function (n) {
                var r = ratio(n.note, n.sur);
                var mat = (n.cours || '–');
                if (mat.indexOf(' > ') !== -1) mat = mat.split(' > ').pop();
                var dateStr = (n.date || '').slice(0, 5);
                var color = subjectColor(mat);
                var mc = n.moyenne_classe ? 'cl.' + esc(n.moyenne_classe) : '';
                return (
                    '<div class="dn-item">' +
                    '<div class="dn-bar" style="background:' + esc(color) + '"></div>' +
                    '<div class="dn-content">' +
                    '<span class="dn-d">' + esc(dateStr) + '</span>' +
                    '<span class="dn-m">' + esc(mat) + '</span>' +
                    '<span class="dn-v ' + gradeClass(r) + '">' + esc((n.note || '?') + (n.sur ? '/' + n.sur : '')) + '</span>' +
                    (mc ? '<span class="dn-mc">' + mc + '</span>' : '') +
                    '</div>' +
                    '</div>'
                );
            }).join('');
        }

        /* ─── ABSENCES ────────────────────────────────────── */
        function renderAbsences(d) {
            var container = el('pjwabs' + ID);
            if (!container) return;
            if (!VIS.absences) {
                var pane = el('abs' + ID); if (pane) pane.style.display = 'none';
                return;
            }
            var list = d.absences || [];
            var count = d.nb_absences != null ? d.nb_absences : list.length;
            var colorClass = count === 0 ? 'c-ok' : 'c-bad';
            var summary = '<div class="vs-summary">' +
                '<span class="vs-summary-count ' + colorClass + '">' + count + '</span>' +
                '<span class="vs-summary-lbl">' + (count <= 1 ? 'absence' : 'absences') + ' cette année</span>' +
                '</div>';
            if (!list.length) {
                container.innerHTML = summary + '<div class="p-empty">Aucune absence</div>';
                return;
            }
            var items = list.map(function (a) {
                var justTag = a.justifie
                    ? '<span class="vs-tag vs-tag-ok">Justifiée</span>'
                    : '<span class="vs-tag vs-tag-nok">Non justifiée</span>';
                var duree = [];
                if (a.nb_jours) duree.push(a.nb_jours + 'j');
                if (a.nb_heures) duree.push(a.nb_heures + 'h');
                var dureeStr = duree.join(' ');
                var row2 = [a.raison, dureeStr].filter(Boolean).join(' · ');
                return '<div class="vs-item">' +
                    '<div class="vs-bar" style="background:#e74c3c"></div>' +
                    '<div class="vs-content">' +
                    '<div class="vs-row1">' +
                    '<span class="vs-date">' + esc(a.date_debut || '') + '</span>' +
                    '<span class="vs-info">' + esc(a.date_fin ? '→ ' + a.date_fin : '') + '</span>' +
                    justTag +
                    '</div>' +
                    (row2 ? '<div class="vs-row2">' + esc(row2) + '</div>' : '') +
                    '</div>' +
                    '</div>';
            }).join('');
            container.innerHTML = summary + items;
        }

        /* ─── RETARDS ─────────────────────────────────────── */
        function renderRetards(d) {
            var container = el('pjwret' + ID);
            if (!container) return;
            if (!VIS.retards) {
                var pane = el('ret' + ID); if (pane) pane.style.display = 'none';
                return;
            }
            var list = d.retards || [];
            var count = d.nb_retards != null ? d.nb_retards : list.length;
            var colorClass = count === 0 ? 'c-ok' : 'c-warn';
            var summary = '<div class="vs-summary">' +
                '<span class="vs-summary-count ' + colorClass + '">' + count + '</span>' +
                '<span class="vs-summary-lbl">' + (count <= 1 ? 'retard' : 'retards') + ' cette année</span>' +
                '</div>';
            if (!list.length) {
                container.innerHTML = summary + '<div class="p-empty">Aucun retard</div>';
                return;
            }
            var items = list.map(function (r) {
                var justTag = r.justifie
                    ? '<span class="vs-tag vs-tag-ok">Justifié</span>'
                    : '<span class="vs-tag vs-tag-nok">Non justifié</span>';
                var dureeStr = r.nb_minutes ? r.nb_minutes + ' min' : '';
                var row2 = [r.justification, r.raison].filter(Boolean).join(' · ');
                return '<div class="vs-item">' +
                    '<div class="vs-bar" style="background:#e67e22"></div>' +
                    '<div class="vs-content">' +
                    '<div class="vs-row1">' +
                    '<span class="vs-date">' + esc(r.date || '') + '</span>' +
                    '<span class="vs-info">' + esc(dureeStr) + '</span>' +
                    justTag +
                    '</div>' +
                    (row2 ? '<div class="vs-row2">' + esc(row2) + '</div>' : '') +
                    '</div>' +
                    '</div>';
            }).join('');
            container.innerHTML = summary + items;
        }

        /* ─── PUNITIONS ───────────────────────────────────── */
        function renderPunitions(d) {
            var container = el('pjwpun' + ID);
            if (!container) return;
            if (!VIS.punitions) {
                var pane = el('pun' + ID); if (pane) pane.style.display = 'none';
                return;
            }
            var list = d.punitions || [];
            var count = d.nb_punitions != null ? d.nb_punitions : list.length;
            var colorClass = count === 0 ? 'c-ok' : 'c-bad';
            var summary = '<div class="vs-summary">' +
                '<span class="vs-summary-count ' + colorClass + '">' + count + '</span>' +
                '<span class="vs-summary-lbl">' + (count <= 1 ? 'punition' : 'punitions') + ' cette année</span>' +
                '</div>';
            if (!list.length) {
                container.innerHTML = summary + '<div class="p-empty">Aucune punition</div>';
                return;
            }
            var items = list.map(function (p) {
                var dureeStr = p.duree ? p.duree + ' min' : '';
                var typeStr = [p.type, dureeStr].filter(Boolean).join(' · ');
                var schedule = '';
                if (p.schedule && p.schedule.length) {
                    schedule = p.schedule.map(function (s) {
                        return s.start + (s.duree ? ' (' + s.duree + ' min)' : '');
                    }).join(', ');
                }
                return '<div class="vs-item">' +
                    '<div class="vs-bar" style="background:#c0392b"></div>' +
                    '<div class="vs-content">' +
                    '<div class="vs-row1">' +
                    '<span class="vs-date">' + esc(p.date_court || p.date || '') + '</span>' +
                    '<span class="vs-info">' + esc(typeStr) + '</span>' +
                    '</div>' +
                    (p.raison ? '<div class="vs-row2">' + esc(p.raison) + '</div>' : '') +
                    (p.circonstances ? '<div class="vs-row2">' + esc(p.circonstances) + '</div>' : '') +
                    (p.travail ? '<div class="vs-row2">Travail : ' + esc(p.travail) + '</div>' : '') +
                    (schedule ? '<div class="vs-row2">📅 ' + esc(schedule) + '</div>' : '') +
                    (p.donneur ? '<div class="vs-row2">Donné par : ' + esc(p.donneur) + '</div>' : '') +
                    '</div>' +
                    '</div>';
            }).join('');
            container.innerHTML = summary + items;
        }

        /* ─── DEVOIRS (onglet) ────────────────────────────── */
        function renderDevoirs(d) {
            var dvEl = el('pjwdv' + ID);
            if (!dvEl) return;
            if (!VIS.devoirs) { var pane = el('dv' + ID); if (pane) pane.style.display = 'none'; return; }

            function devoirHtml(list) {
                return list.map(function (dv) {
                    var done = !!dv.done;
                    var color = dv.color || subjectColor(dv.title);
                    var tooltip = escAttr((dv.title || '') + (dv.description ? ' — ' + dv.description : ''));
                    var subject = (done ? '✓ ' : '') + esc(dv.title || '–');
                    var filesHtml = '';
                    if (dv.fichiers && dv.fichiers.length) {
                        filesHtml = '<div class="dv-files">' +
                            dv.fichiers.map(function (f) {
                                var icon = f.type === 0 ? '🔗' : '📎';
                                return '<a class="dv-file-link" href="' + escAttr(f.url) + '" target="_blank" title="' + escAttr(f.nom) + '">' +
                                    icon + ' ' + esc(f.nom) + '</a>';
                            }).join('') +
                            '</div>';
                    }
                    return (
                        '<div class="dv-item' + (done ? ' dv-done' : '') + '" title="' + tooltip + '">' +
                        '<div class="dv-bar" style="background:' + esc(color) + '"></div>' +
                        '<div class="dv-content">' +
                        '<div class="dv-subject">' + subject + '</div>' +
                        (dv.description ? '<div class="dv-desc">' + esc(dv.description) + '</div>' : '') +
                        filesHtml +
                        '</div>' +
                        '</div>'
                    );
                }).join('');
            }

            var auj = (d.devoirs || []);
            var dem = (d.devoirs_demain || []);
            var html = '';
            if (auj.length) html += '<div class="dv-section-title">Aujourd\'hui</div>' + devoirHtml(auj);
            if (dem.length) html += '<div class="dv-section-title">Demain</div>' + devoirHtml(dem);
            dvEl.innerHTML = html || '<div class="p-empty">Aucun devoir</div>';
        }

        /* ─── MENU CANTINE (v1.0.1) ───────────────────────── */
        function renderMenu(d) {
            var elM = el('pjwmenu' + ID);
            if (!elM) return;
            if (VIS && VIS.menu === false) {
                var pane = el('menu' + ID); if (pane) pane.style.display = 'none'; return;
            }
            var html = '';
            var hasToday = d.menu_midi_aujourdhui && d.menu_midi_aujourdhui.length;
            var hasTomorrow = d.menu_midi_demain && d.menu_midi_demain.length;
            if (hasToday) {
                html += '<div class="dv-section-title">Aujourd\'hui — midi</div>' +
                    '<div class="pj-menu-today">' + esc(d.menu_midi_aujourdhui) + '</div>';
            }
            if (hasTomorrow) {
                html += '<div class="dv-section-title">Demain — midi</div>' +
                    '<div class="pj-menu-today">' + esc(d.menu_midi_demain) + '</div>';
            }
            if (d.menu_semaine && d.menu_semaine.length) {
                html += '<div class="dv-section-title">Semaine</div>' + d.menu_semaine;
            }
            elM.innerHTML = html || '<div class="p-empty">Aucun menu cantine disponible</div>';
        }

        /* ─── MESSAGERIE (v1.0.1) ─────────────────────────── */
        function renderMessages(d) {
            var elM = el('pjwmsg' + ID);
            if (!elM) return;
            if (VIS && VIS.messages === false) {
                var pane = el('msg' + ID); if (pane) pane.style.display = 'none'; return;
            }
            if (d.messages_html && d.messages_html.length) {
                elM.innerHTML = d.messages_html;
            } else {
                elM.innerHTML = '<div class="p-empty">Aucun message</div>';
            }
        }

        /* ─── BADGE PROCHAIN DS (v1.0.1) ──────────────────── */
        function renderProchainDS(d) {
            var elDS = el('pjwds' + ID);
            if (!elDS) return;
            if (VIS && VIS.prochain_ds === false) {
                elDS.style.display = 'none'; return;
            }
            var matiere = d.prochain_DS_matiere || '';
            var date = d.prochain_DS_date || '';
            var jours = (typeof d.prochain_DS_dans_jours === 'number') ? d.prochain_DS_dans_jours : -1;
            if (!matiere || jours < 0) {
                elDS.style.display = 'none';
                elDS.textContent = '';
                return;
            }
            var label = '📝 DS ' + matiere;
            if (jours === 0) label += ' · aujourd\'hui';
            else if (jours === 1) label += ' · demain';
            else label += ' · J-' + jours;
            elDS.textContent = label;
            elDS.title = matiere + ' — ' + date;
            elDS.style.display = '';
            elDS.style.cursor = 'pointer';
            elDS.onclick = function () {
                // Ouvre l'onglet Devoirs
                var btn = document.querySelector('[data-tab="dv' + ID + '"]');
                if (btn) btn.click();
            };
        }

        /* ─── ONGLETS : gestion des clics + onglet par défaut ─ */
        function initTabs() {
            var tabsEl = el('pjwtabs' + ID);
            if (!tabsEl) return;

            // Appliquer l'onglet par défaut configuré (si différent de 'dv' déjà actif dans le HTML)
            if (DEFAULT_TAB && DEFAULT_TAB !== 'dv') {
                tabsEl.querySelectorAll('.tab-btn').forEach(function (b) { b.classList.remove('active'); });
                tabsEl.querySelectorAll('.tab-pane').forEach(function (p) { p.classList.remove('active'); });
                var defBtn = tabsEl.querySelector('[data-tab="' + DEFAULT_TAB + ID + '"]');
                var defPane = el(DEFAULT_TAB + ID);
                if (defBtn) defBtn.classList.add('active');
                if (defPane) defPane.classList.add('active');
            }

            tabsEl.addEventListener('click', function (e) {
                var btn = e.target.closest('.tab-btn');
                if (!btn) return;
                var target = btn.getAttribute('data-tab');
                tabsEl.querySelectorAll('.tab-btn').forEach(function (b) { b.classList.remove('active'); });
                tabsEl.querySelectorAll('.tab-pane').forEach(function (p) { p.classList.remove('active'); });
                btn.classList.add('active');
                var pane = el(target);
                if (pane) pane.classList.add('active');
            });
        }

        /* ─── EDT : navigation flèches ───────────────────── */
        function initEDT() {
            var prev = el('pjwnav-prev' + ID);
            var next = el('pjwnav-next' + ID);
            if (prev) prev.addEventListener('click', function () {
                if (edtDayIdx > 0) { edtDayIdx--; renderEdtDay(edtCurrentData || D); }
            });
            if (next) next.addEventListener('click', function () {
                var max = ((edtCurrentData && edtCurrentData.edt_next_days) || []).length - 1;
                if (edtDayIdx < max) { edtDayIdx++; renderEdtDay(edtCurrentData || D); }
            });
        }

        /* ─── BADGES ONGLETS ──────────────────────────────── */
        function setBadge(elId, count) {
            var b = el(elId);
            if (!b) return;
            var n = parseInt(count, 10);
            if (!isNaN(n) && n > 0) {
                b.textContent = n;
                b.classList.add('visible');
            } else {
                b.classList.remove('visible');
            }
        }

        /* ─── RENDU GLOBAL ────────────────────────────────── */
        function render(d, ts) {
            if (!d || typeof d !== 'object') return;
            renderHeader(d, ts);
            renderEDT(d);
            renderNotesBar(d);
            renderDernieresNotes(d.notes, d);
            renderAbsences(d);
            renderRetards(d);
            renderPunitions(d);
            renderDevoirs(d);
            // v1.0.1
            renderMenu(d);
            renderMessages(d);
            renderProchainDS(d);
            // Masquer les boutons d'onglets des sections non visibles
            var tabsEl = el('pjwtabs' + ID);
            if (tabsEl) {
                var btnMap = {
                    'abs': VIS.absences, 'ret': VIS.retards, 'pun': VIS.punitions,
                    'notes': VIS.notes, 'dv': VIS.devoirs,
                    'menu': VIS.menu !== false, 'msg': VIS.messages !== false
                };
                tabsEl.querySelectorAll('.tab-btn').forEach(function (btn) {
                    var tab = (btn.getAttribute('data-tab') || '').replace(ID, '');
                    if (btnMap.hasOwnProperty(tab) && !btnMap[tab]) {
                        btn.style.display = 'none';
                    }
                });
            }
            // Badges sur les onglets
            setBadge('pjwbabs' + ID, d.nb_absences);
            setBadge('pjwbret' + ID, d.nb_retards);
            setBadge('pjwbpun' + ID, d.nb_punitions);
            var dvCount = ((d.devoirs || []).concat(d.devoirs_demain || [])).filter(function (dv) { return !dv.done; }).length;
            setBadge('pjwbdv' + ID, dvCount);
            // v1.0.1 : badges menus et messages non lus
            setBadge('pjwbmenu' + ID, d.Nb_menus_semaine);
            setBadge('pjwbmsg' + ID, d.Nb_messages_non_lus);
        }

        /* ─── INITIALISATION ──────────────────────────────── */
        initTabs();
        initEDT();

        if (D && Object.keys(D).length > 0) {
            render(D, D.last_update || '');
        }

        /* ─── MISE À JOUR AUTOMATIQUE ─────────────────────── */
        if (LAST_LOGIN_CMD_ID) {
            jeedom.cmd.addUpdateFunction(LAST_LOGIN_CMD_ID, function (_opts) {
                $.ajax({
                    type: 'POST',
                    url: 'plugins/ProJote/core/ajax/ProJote.ajax.php',
                    data: { action: 'GetWidgetData', eqlogic: EID },
                    dataType: 'json',
                    success: function (r) {
                        if (r && r.state === 'ok' && r.result) {
                            render(r.result, new Date().toISOString());
                        }
                    }
                });
            });
        }

    })();
</script>
